<head>
<meta charset="utf-8" />

<title>Pernambuco Materiais — Guarujá · Do básico ao acabamento</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  /* Brand */
  --brand-50:#fff7ed; --brand-100:#ffedd5; --brand-200:#fed7aa; --brand-300:#fdba74;
  --brand-400:#fb923c; --brand-500:#f97316; --brand-600:#ea580c; --brand-700:#c2410c;
  --brand-800:#9a3412; --brand-900:#7c2d12;

  /* Ink */
  --ink-900:#0b1220; --ink-800:#111827; --ink-700:#1f2937; --ink-600:#374151;

  /* Stone (neutrals) */
  --stone-50:#fafaf9; --stone-100:#f5f5f4; --stone-200:#e7e5e4; --stone-300:#d6d3d1;
  --stone-400:#a8a29e; --stone-500:#78716c; --stone-600:#57534e; --stone-700:#44403c;
  --stone-800:#292524; --stone-900:#1c1917;

  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-xl: 24px;
  --radius-pill: 999px;

  --shadow-soft: 0 10px 40px -10px rgba(15, 23, 42, 0.15);
  --shadow-lg: 0 20px 60px -20px rgba(15, 23, 42, 0.25);

  --container: 1240px;
  --pad-x: clamp(20px, 4vw, 40px);

  --font-display: 'Sora', Inter, system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  color: var(--ink-900);
  background: var(--stone-50);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  line-height: 1.5;
}
img { max-width: 100%; display: block; }
button { font: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
a { color: inherit; text-decoration: none; }

.container {
  max-width: var(--container);
  margin: 0 auto;
  padding-left: var(--pad-x);
  padding-right: var(--pad-x);
}

/* Typography defaults */
h1,h2,h3,h4 { font-family: var(--font-display); letter-spacing: -0.02em; margin: 0; text-wrap: balance; }
p { margin: 0; }

.eyebrow {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--stone-600);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.eyebrow::before {
  content: "";
  width: 24px; height: 1px;
  background: currentColor;
  display: inline-block;
}

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 10px;
  padding: 14px 22px;
  border-radius: var(--radius-pill);
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 15px;
  line-height: 1;
  transition: transform .15s ease, box-shadow .2s ease, background .2s ease, color .2s ease, border-color .2s ease;
  white-space: nowrap;
}
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--brand-500); color: #fff; box-shadow: 0 10px 24px -10px rgba(249,115,22,.7); }
.btn-primary:hover { background: var(--brand-600); box-shadow: 0 16px 30px -10px rgba(249,115,22,.8); }
.btn-ghost { background: transparent; color: inherit; border: 1px solid currentColor; opacity: .95; }
.btn-ghost:hover { background: rgba(255,255,255,0.06); }
.btn-outline { background: #fff; color: var(--ink-900); border: 1px solid var(--stone-200); }
.btn-outline:hover { border-color: var(--ink-900); }
.btn-lg { padding: 18px 28px; font-size: 16px; }
.btn-sm { padding: 10px 16px; font-size: 13px; }

/* Section base */
section.sec { padding: clamp(64px, 9vw, 112px) 0; position: relative; }
.sec-head { display: flex; align-items: end; justify-content: space-between; gap: 32px; margin-bottom: 56px; flex-wrap: wrap; }
.sec-title { font-size: clamp(30px, 4.2vw, 48px); font-weight: 700; line-height: 1.05; max-width: 18ch; }
.sec-sub { color: var(--stone-600); max-width: 48ch; }

/* Reveal (on-scroll) */
.reveal { opacity: 0; transform: translateY(20px); transition: opacity .8s ease, transform .8s ease; }
.reveal.is-in { opacity: 1; transform: none; }
@media (prefers-reduced-motion: reduce) {
  .reveal { opacity: 1; transform: none; transition: none; }
}

/* Placeholder image (listrado) */
.ph {
  position: relative;
  background:
    repeating-linear-gradient( 45deg,
      var(--stone-100) 0 10px,
      var(--stone-200) 10px 20px
    );
  color: var(--stone-600);
  overflow: hidden;
  display: flex; align-items: flex-end;
  border-radius: var(--radius-lg);
}
.ph.dark {
  background:
    repeating-linear-gradient( 45deg,
      rgba(255,255,255,.03) 0 10px,
      rgba(255,255,255,.06) 10px 20px
    );
  color: rgba(255,255,255,.7);
}
.ph .lbl {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: .12em;
  text-transform: uppercase;
  padding: 10px 12px;
  background: rgba(0,0,0,.04);
  margin: 12px;
  border-radius: 6px;
  backdrop-filter: blur(4px);
}
.ph.dark .lbl { background: rgba(255,255,255,.08); }

/* ---- HERO dark (default) ---- */
.hero-dark {
  background: var(--ink-900);
  color: #fff;
  position: relative;
  overflow: hidden;
}
.hero-dark::before {
  content: "";
  position: absolute; inset: 0;
  background-image:
    linear-gradient(to right, rgba(255,255,255,.04) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,.04) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, #000 60%, transparent 100%);
  pointer-events: none;
}
.hero-dark::after {
  content: "";
  position: absolute; top:-20%; right:-10%;
  width: 55vw; height: 55vw;
  background: radial-gradient(circle at center, rgba(249,115,22,.35), transparent 60%);
  filter: blur(40px);
  pointer-events: none;
}
.hero-light {
  background: var(--stone-50);
  color: var(--ink-900);
  position: relative;
  overflow: hidden;
}
.hero-light::before {
  content: "";
  position: absolute; inset: 0;
  background-image:
    linear-gradient(to right, rgba(11,18,32,.05) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(11,18,32,.05) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, #000 60%, transparent 100%);
  pointer-events: none;
}
.hero-light::after {
  content: "";
  position: absolute; top:-30%; right:-10%;
  width: 55vw; height: 55vw;
  background: radial-gradient(circle at center, rgba(249,115,22,.18), transparent 60%);
  pointer-events: none;
}

/* ---- Cards ---- */
.card {
  background: #fff;
  border: 1px solid var(--stone-200);
  border-radius: var(--radius-lg);
  transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
}
.card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
  border-color: var(--stone-300);
}

/* ---- Chips ---- */
.chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  border-radius: var(--radius-pill);
  border: 1px solid var(--stone-200);
  background: #fff;
  font-size: 14px;
  font-weight: 500;
  color: var(--ink-900);
  transition: all .15s ease;
  white-space: nowrap;
}
.chip:hover { border-color: var(--ink-900); }
.chip.active {
  background: var(--ink-900);
  color: #fff;
  border-color: var(--ink-900);
}
.chip .count {
  font-family: var(--font-mono);
  font-size: 11px;
  opacity: .6;
}
.chip.active .count { opacity: .8; }

/* Floating wa */
.wa-fab {
  position: fixed; right: 20px; bottom: 20px;
  width: 60px; height: 60px;
  border-radius: 50%;
  background: #25D366;
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 14px 40px -10px rgba(37, 211, 102, 0.6);
  z-index: 40;
  transition: transform .2s ease, box-shadow .2s ease;
  animation: pulseGlow 2.2s ease-in-out infinite;
}
.wa-fab:hover { transform: scale(1.08); }
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 14px 40px -10px rgba(37, 211, 102, 0.6), 0 0 0 0 rgba(37,211,102,0.4); }
  50% { box-shadow: 0 14px 40px -10px rgba(37, 211, 102, 0.6), 0 0 0 16px rgba(37,211,102,0); }
}

/* Small helpers */
.row { display: flex; }
.col { display: flex; flex-direction: column; }
.gap-4 { gap: 16px; }
.gap-6 { gap: 24px; }
.gap-8 { gap: 32px; }
.gap-10 { gap: 40px; }
.gap-12 { gap: 48px; }
.mt-4 { margin-top: 16px; }
.mt-6 { margin-top: 24px; }
.mt-8 { margin-top: 32px; }
.mt-10 { margin-top: 40px; }
.mt-12 { margin-top: 48px; }

/* Responsive grid helpers */
.grid { display: grid; gap: 24px; }
.grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
@media (max-width: 1024px) {
  .grid.cols-4 { grid-template-columns: repeat(2, 1fr); }
  .grid.cols-3 { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 640px) {
  .grid.cols-2, .grid.cols-3, .grid.cols-4 { grid-template-columns: 1fr; }
}
</style>
</head>
