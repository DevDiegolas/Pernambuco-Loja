services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: pernambuco-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: npm run dev -- --host 0.0.0.0

  web-prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pernambuco-prod
    ports:
      - "8080:80"
